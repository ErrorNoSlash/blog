media:
  input: static/images
  output: /images

content:
  - name: posts
    label: Blog posts
    type: collection
    path: content/blog
    format: toml-frontmatter
    filename: "{fields.slug}.md"
    view:
      fields: [title, date]
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug (filename)
        type: string
        description: "lowercase-with-dashes; becomes the URL"
      - name: date
        label: Date
        type: date
        required: true
      - name: taxonomies
        label: Taxonomies
        type: object
        fields:
          - name: tags
            label: Tags
            type: string
            list: true
      - name: body
        label: Content
        type: rich-text