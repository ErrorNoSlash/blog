<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="DS-blog — documenting the projects i make">
  <!-- palette: bg #040507 · text #AEB5B8 · bright #e3e3e3 · border #525252 -->

  <rect x="1" y="1" width="1198" height="258" rx="16" fill="#040507" stroke="#525252" stroke-width="1"/>

  <!-- terminal header bar -->
  <line x1="1" y1="52" x2="1199" y2="52" stroke="#525252" stroke-width="1"/>
  <g fill="none" stroke="#525252" stroke-width="1.5">
    <circle cx="34" cy="27" r="6"/>
    <circle cx="56" cy="27" r="6"/>
    <circle cx="78" cy="27" r="6"/>
  </g>
  <text x="600" y="32" text-anchor="middle"
        font-family="JetBrains Mono, Fira Code, Courier New, monospace"
        font-size="14" fill="#AEB5B8" opacity="0.55">dias@errornoslash: ~/blog</text>

  <!-- header-bar icons, right side -->
  <g stroke="#AEB5B8" fill="none" stroke-width="1.5" opacity="0.55" stroke-linecap="round">
    <!-- code brackets -->
    <g transform="translate(1082,27)">
      <path d="M -5 -6 L -11 0 L -5 6"/>
      <path d="M 5 -6 L 11 0 L 5 6"/>
    </g>
    <!-- git branch -->
    <g transform="translate(1122,27)">
      <circle cx="-4" cy="-6" r="2.6"/>
      <circle cx="-4" cy="7" r="2.6"/>
      <circle cx="7" cy="-6" r="2.6"/>
      <path d="M -4 -3.4 L -4 4.4"/>
      <path d="M 7 -3.4 C 7 2 -1 1 -3 3.5"/>
    </g>
    <!-- rss -->
    <g transform="translate(1160,27)">
      <path d="M -6 6 A 12 12 0 0 1 6 -6" fill="none"/>
      <path d="M -6 0 A 6 6 0 0 1 0 -6" fill="none"/>
      <circle cx="-5" cy="5" r="1.6" fill="#AEB5B8" stroke="none"/>
    </g>
  </g>

  <!-- flanking six-spoke snowflakes (nod to the portfolio's Nix roots) -->
  <g stroke="#525252" stroke-width="2.5" opacity="0.45" stroke-linecap="round" transform="translate(150,156)">
    <line x1="-30" y1="0" x2="30" y2="0"/>
    <line x1="-15" y1="-26" x2="15" y2="26"/>
    <line x1="-15" y1="26" x2="15" y2="-26"/>
    <circle cx="0" cy="0" r="5" fill="none"/>
  </g>
  <g stroke="#525252" stroke-width="2.5" opacity="0.45" stroke-linecap="round" transform="translate(1050,156)">
    <line x1="-30" y1="0" x2="30" y2="0"/>
    <line x1="-15" y1="-26" x2="15" y2="26"/>
    <line x1="-15" y1="26" x2="15" y2="-26"/>
    <circle cx="0" cy="0" r="5" fill="none"/>
  </g>

  <!-- faint grey dust on both sides -->
  <g fill="#AEB5B8">
    <circle cx="220" cy="95" r="1.3" opacity="0.2"/>
    <circle cx="120" cy="215" r="1.1" opacity="0.15"/>
    <circle cx="280" cy="200" r="1.4" opacity="0.22"/>
    <circle cx="90" cy="110" r="1.0" opacity="0.14"/>
    <circle cx="330" cy="120" r="1.1" opacity="0.16"/>
    <circle cx="920" cy="95" r="1.4" opacity="0.22"/>
    <circle cx="1000" cy="205" r="1.1" opacity="0.16"/>
    <circle cx="1120" cy="115" r="1.5" opacity="0.25"/>
    <circle cx="1160" cy="210" r="1.2" opacity="0.18"/>
    <circle cx="880" cy="180" r="1.0" opacity="0.14"/>
  </g>

  <!-- centered prompt line -->
  <text x="600" y="106" text-anchor="middle"
        font-family="JetBrains Mono, Fira Code, Courier New, monospace"
        font-size="20" fill="#AEB5B8">$ zola serve</text>

  <!-- centered title with blinking block cursor -->
  <text x="600" y="176" text-anchor="middle"
        font-family="JetBrains Mono, Fira Code, Courier New, monospace"
        font-size="64" font-weight="700" fill="#e3e3e3"
        letter-spacing="1">DS-blog<tspan fill="#e3e3e3">█<animate attributeName="fill-opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" calcMode="discrete" repeatCount="indefinite"/></tspan></text>

  <!-- tagline as a comment -->
  <text x="600" y="220" text-anchor="middle"
        font-family="JetBrains Mono, Fira Code, Courier New, monospace"
        font-size="20" fill="#AEB5B8" opacity="0.75"># documenting the projects i make</text>
</svg>
